name: Onvif - Release and Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate changelog compliance
        uses: ConfiguredThings/validate-changelog-action@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@configuredthings'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.BEBOTALULA_PAT_READ_PACKAGES }}

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check changelog entry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "Error: No changelog entry found for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi

      - name: Check changelog for pre-release entries of this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if grep -qP "^## \[$VERSION-" CHANGELOG.md; then
              echo "Error: CHANGELOG.md contains pre-release entries for $VERSION:"
              grep -P "^## \[$VERSION-" CHANGELOG.md
              echo ""
              echo "A stable release changelog entry must not list pre-release variants of the same version."
              echo "Remove or consolidate the pre-release entries (e.g. $VERSION-alpha.x, $VERSION-beta.x) before releasing."
              exit 1
            fi
          fi

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release-notes.md
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" =~ -[a-zA-Z] ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
